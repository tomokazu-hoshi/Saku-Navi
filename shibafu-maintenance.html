<article>
  <h2>【時期別】芝生の手入れスケジュール</h2>
  <p>美しい芝生を維持するためには、季節ごとの適切な作業が欠かせません。（※日本芝の場合）</p>

  <table border="1" style="width:100%; border-collapse: collapse;">
    <thead>
      <tr style="background-color: #f2f2f2;">
        <th>時期</th>
        <th>主な作業内容</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><strong>3月〜4月</strong></td>
        <td>更新作業（サッチング、穴あけ）、目土入れ</td>
      </tr>
      <tr>
        <td><strong>5月〜8月</strong></td>
        <td>定期的な芝刈り（週1回〜）、水やり、施肥</td>
      </tr>
      <tr>
        <td><strong>9月〜10月</strong></td>
        <td>最後の芝刈り、冬越しに向けた準備</td>
      </tr>
      <tr>
        <td><strong>11月〜2月</strong></td>
        <td>休眠期（基本的に作業なし、踏圧を避ける）</td>
      </tr>
    </tbody>
  </table>
</article>
