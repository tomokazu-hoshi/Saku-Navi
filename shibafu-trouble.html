<article>
  <h2>芝生のトラブル解決ガイド</h2>
  <p>「芝生の色がおかしい」「元気がない」といった症状から原因を探せます。</p>

  <h3>Q. 芝生が部分的に茶色い輪っか状に枯れてきた</h3>
  <p><strong>原因：</strong> ラージパッチなどの「病気」の可能性が高いです。<br>
  <strong>対策：</strong> 殺菌剤の散布と、水はけの改善を行いましょう。</p>

  <h3>Q. 葉が食べられた跡があり、枯れてきた</h3>
  <p><strong>原因：</strong> シバツトガやコガネムシの幼虫による「食害」が疑われます。<br>
  <strong>対策：</strong> 適用のある殺虫剤を散布し、害虫を駆除します。</p>

  <h3>Q. 全体的に元気がなく、地面が固い</h3>
  <p><strong>原因：</strong> 「土壌の硬化」や「酸素不足」です。<br>
  <strong>対策：</strong> エアレーション（穴あけ作業）を行い、根に空気を送り込みましょう。</p>
</article>
