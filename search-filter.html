---
layout: default
title: "こだわり条件検索｜咲くナビ"
---

<style>
  .filter-group { background: #f1f8e9; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
  .filter-group h3 { font-size: 1rem; color: #4A7c59; margin: 0 0 10px 0; border-bottom: 1px solid #c8e6c9; }
  .checkbox-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .checkbox-list label { font-size: 0.9rem; display: flex; align-items: center; cursor: pointer; color: #333; }
  .checkbox-list input { margin-right: 8px; transform: scale(1.1); }

  #search-btn {
    display: block; width: 100%; padding: 16px; background: #4A7c59; color: white;
    border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; margin: 25px 0;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  #result-count { font-size: 0.9rem; color: #666; margin-bottom: 10px; font-weight: bold; }
  .result-item {
    display: block; background: white; border: 1px solid #e0eadd;
    padding: 16px; border-radius: 12px; margin-bottom: 12px; text-decoration: none; color: #333;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .result-item b { color: #2e7d32; display: block; font-size: 1.1rem; margin-bottom: 4px; }
  .result-tags { font-size: 0.75rem; color: #888; }
</style>

<div style="padding: 10px;">
  <h2 style="text-align: center; color: #4A7c59;">条件を絞り込む</h2>

  <div class="filter-group">
    <h3>🌿 植物の分類</h3>
    <div class="checkbox-list">
      <label><input type="checkbox" name="tag" value="一年草"> 一年草</label>
      <label><input type="checkbox" name="tag" value="多年草"> 多年草</label>
      <label><input type="checkbox" name="tag" value="宿根草"> 宿根草</label>
      <label><input type="checkbox" name="tag" value="ハーブ"> ハーブ</label>
    </div>
  </div>

  <div class="filter-group">
    <h3>🎨 花の色</h3>
    <div class="checkbox-list">
      <label><input type="checkbox" name="tag" value="赤"> 赤</label>
      <label><input type="checkbox" name="tag" value="ピンク"> ピンク</label>
      <label><input type="checkbox" name="tag" value="白"> 白</label>
      <label><input type="checkbox" name="tag" value="青"> 青</label>
    </div>
  </div>

  <button id="search-btn">この条件で検索する</button>

  <div id="result-count"></div>
  <div id="search-results"></div>
</div>

<script>
let plantData = [];

// 1. 自動生成されたJSONデータを読み込む
fetch("{{ '/search-data.json' | relative_url }}")
  .then(response => response.json())
  .then(data => {
    plantData = data;
    console.log("データ読み込み完了");
  })
  .catch(error => console.error("データの読み込みに失敗しました:", error));

// 2. 検索ボタンの動作
document.getElementById('search-btn').addEventListener('click', function() {
  const selectedTags = Array.from(document.querySelectorAll('input[name="tag"]:checked')).map(el => el.value);
  const resultsContainer = document.getElementById('search-results');
  const countContainer = document.getElementById('result-count');
  
  if (selectedTags.length === 0) {
    alert("絞り込み条件を1つ以上選択してください。");
    return;
  }

  // フィルタリング（AND検索：選択したタグが全て含まれる記事を抽出）
  const filteredResults = plantData.filter(plant => 
    selectedTags.every(tag => plant.tags.includes(tag))
  );

  resultsContainer.innerHTML = '';
  countContainer.textContent = `検索結果: ${filteredResults.length} 件`;

  if (filteredResults.length === 0) {
    resultsContainer.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px;">条件に合う植物が見つかりませんでした。</p>';
    return;
  }

  filteredResults.forEach(plant => {
    const item = document.createElement('a');
    item.href = plant.url;
    item.className = 'result-item';
    item.innerHTML = `
      <b>${plant.title}</b>
      <div class="result-tags">🏷 ${plant.tags.join(' / ')}</div>
    `;
    resultsContainer.appendChild(item);
  });
  
  // 結果エリアへスクロール（スマホ対策）
  countContainer.scrollIntoView({ behavior: 'smooth' });
});
</script>
