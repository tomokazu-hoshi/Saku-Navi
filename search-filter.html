---
layout: default
title: "こだわり条件検索｜咲くナビ"
---

<style>
  .filter-group { background: #f1f8e9; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
  .filter-group h3 { font-size: 1rem; color: #4A7c59; margin-top: 0; border-bottom: 1px solid #c8e6c9; padding-bottom: 5px; }
  .checkbox-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .checkbox-list label { font-size: 0.9rem; display: flex; align-items: center; cursor: pointer; }
  .checkbox-list input { margin-right: 8px; transform: scale(1.2); }

  #search-btn {
    display: block; width: 100%; padding: 15px; background: #4A7c59; color: white;
    border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; margin: 20px 0;
  }

  #result-count { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
  .result-item {
    display: block; background: white; border: 1px solid #e0eadd;
    padding: 15px; border-radius: 10px; margin-bottom: 10px; text-decoration: none; color: #333;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }
  .result-item b { color: #2e7d32; display: block; }
</style>

<div style="padding: 10px;">
  <h2 style="text-align: center; color: #4A7c59;">条件を絞り込む</h2>

  <!-- 絞り込み条件エリア -->
  <div class="filter-group">
    <h3>🌿 植物の種類</h3>
    <div class="checkbox-list">
      <label><input type="checkbox" name="tag" value="ハーブ"> ハーブ</label>
      <label><input type="checkbox" name="tag" value="多年草"> 多年草</label>
    </div>
  </div>

  <div class="filter-group">
    <h3>🎨 花の色</h3>
    <div class="checkbox-list">
      <label><input type="checkbox" name="tag" value="白"> 白</label>
      <label><input type="checkbox" name="tag" value="紫"> 紫</label>
      <label><input type="checkbox" name="tag" value="青"> 青</label>
    </div>
  </div>

  <div class="filter-group">
    <h3>⛱ 育てる環境</h3>
    <div class="checkbox-list">
      <label><input type="checkbox" name="tag" value="日向"> 日向</label>
      <label><input type="checkbox" name="tag" value="日陰"> 日陰</label>
    </div>
  </div>

  <button id="search-btn">この条件で検索する</button>

  <!-- 検索結果表示エリア -->
  <div id="result-count"></div>
  <div id="search-results"></div>
</div>

<script>
  // JSONデータを読み込む（実際は {{ site.baseurl }}/search-data.json から取得）
  const plantData = [
    { name: "ラベンダー", url: "/plants/lavender.html", tags: ["紫", "春", "ハーブ", "日向"] },
    { name: "ギボウシ", url: "/plants/hosta.html", tags: ["白", "夏", "多年草", "日陰"] },
    { name: "ローズマリー", url: "/plants/rosemary.html", tags: ["青", "春", "ハーブ", "日向"] }
  ];

  document.getElementById('search-btn').addEventListener('click', function() {
    const selectedTags = Array.from(document.querySelectorAll('input[name="tag"]:checked')).map(el => el.value);
    const resultsContainer = document.getElementById('search-results');
    const countContainer = document.getElementById('result-count');
    
    // フィルタリング（選択されたタグが全て含まれているものを抽出）
    const filteredResults = plantData.filter(plant => 
      selectedTags.every(tag => plant.tags.includes(tag))
    );

    // 結果表示の更新
    resultsContainer.innerHTML = '';
    countContainer.textContent = `検索結果: ${filteredResults.length} 件`;

    if (filteredResults.length === 0) {
      resultsContainer.innerHTML = '<p style="text-align:center; color:#999;">条件に合う植物が見つかりませんでした。</p>';
      return;
    }

    filteredResults.forEach(plant => {
      const item = document.createElement('a');
      item.href = plant.url;
      item.className = 'result-item';
      item.innerHTML = `<b>${plant.name}</b><small style="color:#888;">${plant.tags.join(' / ')}</small>`;
      resultsContainer.appendChild(item);
    });
  });
</script>
