<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        :root {
            --primary-green: #2d5a27;   
            --nav-green: #4caf50;       
            --white: #ffffff;
            --text-main: #333333;
            --overlay-bg: rgba(45, 90, 39, 0.98); 
            --accent-yellow: #fff9c4;
        }
        body { font-family: sans-serif; line-height: 1.6; color: var(--text-main); background-color: #f4f7f4; margin: 0; padding: 0; }

        /* --- ハンバーガーメニュー（3本線）タップしやすく修正 --- */
        .menu-trigger {
            position: fixed; top: 15px; left: 15px; 
            width: 50px; height: 50px; /* タップ範囲を拡大 */
            cursor: pointer; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.8); border-radius: 50%; /* ボタンを分かりやすく */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .menu-trigger span { display: block; width: 25px; height: 3px; background-color: var(--primary-green); margin: 3px 0; transition: 0.3s; }
        
        /* メニューが開いている時の3本線の形（×印） */
        .active-menu span:nth-of-type(1) { transform: translateY(9px) rotate(-45deg); background-color: #fff !important; }
        .active-menu span:nth-of-type(2) { opacity: 0; }
        .active-menu span:nth-of-type(3) { transform: translateY(-9px) rotate(45deg); background-color: #fff !important; }

        /* --- 全画面メニューオーバーレイ --- */
        .overlay { height: 100%; width: 0; position: fixed; z-index: 9998; top: 0; left: 0; background-color: var(--overlay-bg); overflow-x: hidden; overflow-y: auto; transition: 0.4s; display: flex; flex-direction: column; align-items: center; padding-top: 80px; }
        .overlay-content { width: 90%; max-width: 450px; text-align: center; padding-bottom: 40px; }

        /* 特集バナーデザイン */
        .menu-feature-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 35px; }
        .menu-special-banner { background: rgba(255, 255, 255, 0.1); border: 1px solid var(--accent-yellow); border-radius: 12px; padding: 18px; text-decoration: none; display: block; text-align: left; }
        .menu-special-title { color: white; font-size: 1.0rem; font-weight: bold; margin: 0; }
        .menu-special-tag { background: var(--accent-yellow); color: var(--primary-green); font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; margin-right: 8px; font-weight: bold; }

        /* カテゴリーボタン（2列） */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; }
        .menu-btn { background: rgba(255,255,255,0.15); color: white !important; text-decoration: none; height: 75px; display: flex; flex-direction: column; justify-content: center; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); font-weight: bold; font-size: 0.9rem; }
        .menu-btn span { font-size: 0.65rem; opacity: 0.7; margin-top: 3px; }

        /* --- 基本構造 --- */
        header { background: var(--white); border-bottom: 5px solid var(--primary-green); padding: 30px 15px; text-align: center; }
        header h1 { margin: 0; color: var(--primary-green); font-size: 1.8rem; }
        nav.top-bar { background: var(--nav-green); color: white; padding: 10px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; font-size: 0.9rem; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .main-card { background: var(--white); border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* カテゴリタイル（復旧済み） */
        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
        .btn-home { background: var(--primary-green); color: white !important; height: 90px; text-decoration: none; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 15px; font-weight: bold; font-size: 1.0rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-home span { font-size: 0.7rem; opacity: 0.8; margin-top: 5px; }

        footer { background: #e0eadd; text-align: center; padding: 40px 20px; margin-top: 40px; font-size: 0.85rem; color: #555; }
    </style>
</head>
<body>

<div class="menu-trigger" id="menuBtn" onclick="toggleNav()">
    <span></span><span></span><span></span>
</div>

<div id="fullMenu" class="overlay">
    <div class="overlay-content">
        <div style="color:white; margin-bottom:15px; font-weight:bold; font-size:1.0rem;">🌿 咲くナビ特別ガイド</div>
        
        <div class="menu-feature-list">
            <a href="{{ '/shibafu-guide.html' | relative_url }}" class="menu-special-banner">
                <span class="menu-special-tag">人気</span><span class="menu-special-title">芝生の完全攻略ガイド</span>
            </a>
            <a href="{{ '/herb-project.html' | relative_url }}" class="menu-special-banner">
                <span class="menu-special-tag">実用</span><span class="menu-special-title">ハーブの森プロジェクト</span>
            </a>
            <a href="{{ '/shade-garden.html' | relative_url }}" class="menu-special-banner">
                <span class="menu-special-tag">解決</span><span class="menu-special-title">日陰のシェードガーデン</span>
            </a>
            <a href="{{ '/low-maintenance.html' | relative_url }}" class="menu-special-banner">
                <span class="menu-special-tag">時短</span><span class="menu-special-title">究極のずぼら庭作り</span>
            </a>
        </div>

        <div style="color:white; margin-bottom:10px; font-weight:bold; font-size:0.9rem; opacity:0.8;">カテゴリーから探す</div>
        <div class="menu-grid">
            <a href="{{ '/index-a-column.html' | relative_url }}" class="menu-btn">五十音<span>Index</span></a>
            <a href="{{ '/months-menu.html' | relative_url }}" class="menu-btn">月別<span>Months</span></a>
            <a href="{{ '/seasons-menu.html' | relative_url }}" class="menu-btn">季節<span>Season</span></a>
            <a href="{{ '/colors-menu.html' | relative_url }}" class="menu-btn">花の色<span>Color</span></a>
            <a href="{{ '/types-menu.html' | relative_url }}" class="menu-btn">分類<span>Type</span></a>
            <a href="{{ '/envs-menu.html' | relative_url }}" class="menu-btn">環境<span>Env</span></a>
            <a href="{{ '/purposes-menu.html' | relative_url }}" class="menu-btn">目的<span>Purpose</span></a>
            <a href="{{ '/families-menu.html' | relative_url }}" class="menu-btn">科名<span>Family</span></a>
            <a href="{{ '/meanings-menu.html' | relative_url }}" class="menu-btn">花言葉<span>Meaning</span></a>
            <a href="{{ '/' | relative_url }}" class="menu-btn" style="background:rgba(255,255,255,0.3);">トップ<span>Home</span></a>
        </div>
    </div>
</div>

<header><h1>{{ site.title }}</h1></header>
<nav class="top-bar">〜 あなたの庭に、最高の「咲く」を 〜</nav>

<div class="container">
    <article class="main-card">
        {{ content }}
    </article>
</div>

<footer><p>&copy; 2026 {{ site.title }}</p></footer>

<script>
    function toggleNav() {
        const menu = document.getElementById("fullMenu");
        const btn = document.getElementById("menuBtn");
        if (menu.style.width === "100%") {
            menu.style.width = "0%";
            btn.classList.remove("active-menu");
        } else {
            menu.style.width = "100%";
            btn.classList.add("active-menu");
        }
    }
</script>
</body>
</html>
