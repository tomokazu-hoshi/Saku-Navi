---
layout: default
---

<div class="post-header" style="margin-bottom: 30px;">
    <h1 style="color: var(--primary-green); border-bottom: 3px solid var(--nav-green); padding-bottom: 15px;">{{ page.title }}</h1>
    <div class="post-date" style="color: #888; font-size: 0.9rem;">
        更新日: {{ page.date | date: "%Y年%m月%d日" }}
    </div>
</div>

<div class="post-content">
    {{ content }}
</div>

<div class="post-footer" style="margin-top: 50px; padding-top: 20px; border-top: 1px dotted #ccc; text-align: center;">
    <a href="{{ '/' | relative_url }}" class="btn-home">トップページに戻る</a>
</div>
